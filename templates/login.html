<!DOCTYPE html>
<html>
<head>
<title>CampusOps Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#7b2ff7,#5c00ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    display:flex;
    gap:30px;
}

.card{
    background:white;
    width:300px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    text-align:center;
    color:#5c00ff;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
    outline:none;
}

input:focus{
    border-color:#5c00ff;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#5c00ff;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    margin-top:10px;
}

.login-btn:hover{
    background:#3a00cc;
}

.register-btn{
    display:block;
    text-align:center;
    margin-top:12px;
    padding:12px;
    background:#eee5ff;
    color:#5c00ff;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

.register-btn:hover{
    background:#5c00ff;
    color:white;
}

</style>
</head>

<body>

<div class="container">

    <!-- ADMIN -->
    <div class="card">
        <h2>Admin</h2>

        <form action="/admin-login" method="POST">
            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>
    </div>

    <!-- FACULTY -->
    <div class="card">
        <h2>Faculty</h2>

        <form action="/faculty-login" method="POST">
            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>

        <a href="/faculty-register" class="register-btn">
            Register New Faculty
        </a>
    </div>

    <!-- STUDENT -->
    <div class="card">
        <h2>Student</h2>

        <form action="/student-login" method="POST">
            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>

        <a href="/student-register" class="register-btn">
            Register New Student
        </a>
    </div>

</div>

</body>
</html>
