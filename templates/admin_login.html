<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusOps Admin Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6c3cff,#4b1fb8);
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#6c3cff;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:#6c3cff;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#4b1fb8;
}

.back{
    text-align:center;
    margin-top:15px;
}

.back a{
    text-decoration:none;
    color:#6c3cff;
}

.demo{
    margin-top:15px;
    text-align:center;
    color:#888;
    font-size:13px;
}
</style>

</head>

<body>

<div class="login-box">

    <h1>🎓 CampusOps</h1>
    <p>Administrator Login</p>

    <form action="/admin-login" method="POST">

        <input type="text" name="username" placeholder="Admin Username" required>

        <input type="password" name="password" placeholder="Admin Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="demo">
        Username: admin<br>
        Password: admin123
    </div>

    <div class="back">
        <a href="/">← Back</a>
    </div>

</div>

</body>
</html>
