<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#7b2ff7,#5c00ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:white;
    padding:30px;
    width:350px;
    border-radius:20px;
}

h2{
    text-align:center;
    color:#5c00ff;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#5c00ff;
    color:white;
    border:none;
    border-radius:10px;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Student Registration</h2>

    <form>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button type="submit">Register</button>
    </form>

    <a href="/">Back to Login</a>
</div>

</body>
</html>
