<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#5c00ff,#3a00cc);
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    margin:0;
}

/* CONTAINER */
.container{
    padding:20px;
}

/* BUTTON */
button{
    padding:10px 15px;
    background:#5c00ff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:6px;
    margin-bottom:15px;
    transition:0.3s;
}

button:hover{
    background:#3a00cc;
    transform:scale(1.05);
}

/* TABLE */
table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th{
    background:#5c00ff;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f1f1ff;
}

/* EDIT BUTTON */
.edit-btn{
    background:#28a745;
}

.edit-btn:hover{
    background:#1f7a33;
}

/* BACK LINK */
a{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    color:#5c00ff;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
    <h2>Students Management</h2>
    <a href="/admin-login" style="color:white;text-decoration:none;">← Back to Dashboard</a>
</div>

<div class="container">

<button onclick="alert('Add Student Feature Coming Soon')">
    + Add Student
</button>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Course</th>
    <th>Action</th>
</tr>

<tr>
    <td>1</td>
    <td>Rahul Sharma</td>
    <td>Computer Science</td>
    <td><button class="edit-btn">Edit</button></td>
</tr>

<tr>
    <td>2</td>
    <td>Priya Patel</td>
    <td>Information Tech</td>
    <td><button class="edit-btn">Edit</button></td>
</tr>

<tr>
    <td>3</td>
    <td>Amit Kumar</td>
    <td>Mechanical</td>
    <td><button class="edit-btn">Edit</button></td>
</tr>

</table>

</div>

</body>
</html>
