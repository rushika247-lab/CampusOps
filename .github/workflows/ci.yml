name: CampusOps CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Flask App
        run: |
          python -m py_compile app.py

      - name: Read Version
        run: |
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      # SonarQube (Enable Later)
      # - name: SonarQube Scan
      #   uses: SonarSource/sonarqube-scan-action@v5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            rushika2007/campusops:latest
            rushika2007/campusops:${{ github.sha }}
            rushika2007/campusops:v${{ env.VERSION }}

      - name: Create Build Artifact
  run: |
    mkdir build

    cp app.py build/
    cp requirements.txt build/
    cp Dockerfile build/
    cp VERSION build/
    cp CHANGELOG.md build/
    cp README.md build/

    if [ -d "templates" ]; then
      cp -r templates build/
    fi

    if [ -d "static" ]; then
      cp -r static build/
    fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: campusops-build
          path: build/

      - name: Success Message
        run: |
          echo "CampusOps CI/CD Pipeline Completed Successfully!"